name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Lint source
        run: ruff check src/
      - name: Check formatting
        run: ruff format --check src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project and dev dependencies
        run: pip install -e ".[dev]"
      - name: Type-check core modules
        run: >-
          mypy
          src/discord_cli/config.py
          src/discord_cli/errors.py
          src/discord_cli/output.py
          src/discord_cli/registry.py

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project and development dependencies
        run: pip install -e ".[dev]"
      - name: Run tests or smoke test
        shell: bash
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest tests/ --cov=discord_cli --cov-report=xml --cov-report=term-missing
          else
            python -c "import discord_cli; print(discord_cli.__version__)"
          fi
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build distribution
        run: python -m build
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  ci:
    name: ci
    if: always()
    needs: [lint, typecheck, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI job to succeed
        run: |
          test "${{ needs.lint.result }}" = success
          test "${{ needs.typecheck.result }}" = success
          test "${{ needs.test.result }}" = success
          test "${{ needs.build.result }}" = success
