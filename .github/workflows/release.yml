name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Existing version to publish (for example, 1.2.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and dev dependencies
        run: pip install -e ".[dev]"
      - name: Run lint checks
        run: |
          ruff check src/
          ruff format --check src/
      - name: Run tests or smoke test
        shell: bash
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest tests/
          else
            python -c "import discord_cli; print(discord_cli.__version__)"
          fi

  release:
    needs: lint-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.semantic_release.outputs.released }}
      version: ${{ steps.semantic_release.outputs.version }}
      tag: ${{ steps.semantic_release.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and dev dependencies
        run: pip install -e ".[dev]"

      - name: Configure Git for semantic-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release (version + changelog + tag)
        id: semantic_release
        run: |
          python -m semantic_release version
          # Check if a new version was released
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$(python -c 'import discord_cli; print(discord_cli.__version__)')" >> $GITHUB_OUTPUT
            echo "tag=v$(python -c 'import discord_cli; print(discord_cli.__version__)')" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build distribution
        if: steps.semantic_release.outputs.released == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.semantic_release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: steps.semantic_release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.semantic_release.outputs.tag }}" \
            --title "${{ steps.semantic_release.outputs.tag }}" \
            --notes-file CHANGELOG.md \
            dist/*.whl dist/*.tar.gz

  publish-existing-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify the requested version
        run: |
          test "$(python -c 'from pathlib import Path; namespace = {}; exec(Path("src/discord_cli/__init__.py").read_text(), namespace); print(namespace["__version__"])')" = "${{ inputs.version }}"
      - name: Build distribution
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "v${{ inputs.version }}" >/dev/null 2>&1 || \
            gh release create "v${{ inputs.version }}" \
              --title "v${{ inputs.version }}" \
              --generate-notes \
              dist/*.whl dist/*.tar.gz
